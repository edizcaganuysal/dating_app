services:
  postgres:
    image: postgres:16-alpine
    container_name: yuni-postgres
    environment:
      POSTGRES_USER: yuni
      POSTGRES_PASSWORD: yuni
      POSTGRES_DB: yuni_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yuni -d yuni_dev"]
      interval: 2s
      timeout: 5s
      retries: 15

volumes:
  pgdata:
